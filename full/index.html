<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pelajaran - SMP Swasta IT Madani</title>
    <meta name="theme-color" content="#0a0c10">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
</head>
<body class="light-theme">
    <header class="mobile-header">
        <button id="menu-toggle" class="menu-btn" aria-label="Buka menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <span class="mobile-logo">SMP IT Madani</span>
    </header>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo-container">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="logo-text">SMP IT Madani</span>
                </a>
            </div>
            
            <div class="class-card">
                <div class="class-badge">BERANDA</div>
                <h1 class="class-title">Jadwal Pelajaran</h1>
                <p class="school-subtitle">SMP Swasta IT Madani</p>
                <div class="divider"></div>
                <div class="meta-row">
                    <span class="meta-label">Tahun Ajaran:</span>
                    <span class="meta-value">2026 / 2027</span>
                </div>
                <div class="meta-row">
                    <span class="meta-label">Semester:</span>
                    <span class="meta-value">Genap</span>
                </div>
            </div>

            <div class="stats-panel">
                <h3>Ringkasan</h3>
                <div class="stat-grid">
                    <div class="stat-card">
                        <span class="stat-num" id="total-classes">11</span>
                        <span class="stat-label">Kelas</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num" id="total-teachers">30+</span>
                        <span class="stat-label">Guru Pengajar</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-actions">
                <a href="teachers.html" class="theme-btn">
                    <span class="theme-btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </span>
                    <span class="theme-btn-text">Daftar Guru</span>
                </a>
            </div>

            <div class="sidebar-actions">
                <button id="autoscroll-toggle" class="theme-btn">
                    <span class="theme-btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="8 12 11 15 16 9"></polyline>
                        </svg>
                    </span>
                    <span class="theme-btn-text">Auto-scroll</span>
                    <span class="info-badge" id="autoscroll-info">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        <span class="tooltip-text">Langsung scroll ke jadwal hari ini saat halaman kelas dibuka.</span>
                    </span>
                </button>
            </div>

            <div class="sidebar-actions">
                <button id="install-btn" class="theme-btn hidden">
                    <span class="theme-btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </span>
                    <span class="theme-btn-text">Pasang Aplikasi</span>
                </button>
            </div>

            <div class="theme-toggle-container">
                <button id="theme-toggle" class="theme-btn">
                    <span class="theme-btn-icon">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line>
                        </svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </span>
                    <span class="theme-btn-text">Ganti Tema</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h2 class="section-title">Pilih Kelas</h2>
                    <p class="section-desc">Klik kelas untuk melihat jadwal pelajaran lengkap.</p>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="search-input" placeholder="Cari kelas...">
                    </div>
                </div>
            </header>

            <div class="class-grid" id="class-grid">
            </div>
        </main>
    </div>

    <script src="home.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
</body>
</html>
